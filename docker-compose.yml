volumes:
  sites:
  logs:
  db-data:
  redis-cache-data:
  redis-queue-data:

x-dealerp-image: &dealerp-image
  build:
    context: .
    dockerfile: Dockerfile
    args:
      ERPNEXT_VERSION: ${ERPNEXT_VERSION:-v15}
      DEALERP_REPO_URL: ${DEALERP_REPO_URL}
      DEALERP_BRANCH: ${DEALERP_BRANCH:-main}

services:

  mariadb:
    image: mariadb:10.6
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql

  redis-cache:
    image: redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - redis-cache-data:/data

  redis-queue:
    image: redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data

  configurator:
    <<: *dealerp-image
    restart: "no"
    entrypoint:
      - bash
      - -c
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started

  # S'exécute une seule fois : crée le site s'il n'existe pas encore,
  # puis installe erpnext ET dealerp dans le même new-site.
  create-site:
    <<: *dealerp-image
    restart: "no"
    entrypoint:
      - bash
      - -c
    command:
      - >
        wait_for_tcp() {
          until (echo > /dev/tcp/$$1/$$2) >/dev/null 2>&1; do sleep 1; done;
        };
        wait_for_tcp mariadb 3306;
        wait_for_tcp redis-cache 6379;
        wait_for_tcp redis-queue 6379;
        start=$$(date +%s);
        until [ -f sites/common_site_config.json ] || [ $$(( $$(date +%s) - start )) -gt 120 ]; do sleep 1; done;
        if [ ! -d sites/${SITE_NAME:-frontend} ]; then
          bench new-site --mariadb-user-host-login-scope='%' --admin-password="$$ADMIN_PASSWORD" --db-root-username=root --db-root-password="$$DB_ROOT_PASSWORD" --install-app erpnext --install-app dealerp --set-default "${SITE_NAME:-frontend}";
        fi
    environment:
      ADMIN_PASSWORD: ${ERPNEXT_ADMIN_PASSWORD}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      SITE_NAME: ${SITE_NAME:-frontend}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      configurator:
        condition: service_completed_successfully

  # S'exécute à CHAQUE déploiement (contrairement à create-site) : applique
  # les patches/migrations du site existant après chaque nouvelle version
  # de dealerp buildée dans l'image. C'est l'étape que le plan ChatGPT
  # mentionnait en texte mais ne traduisait pas en service réel.
  migrate:
    <<: *dealerp-image
    restart: "no"
    entrypoint:
      - bash
      - -c
    command:
      - >
        if [ -d sites/${SITE_NAME:-frontend} ]; then
          bench --site ${SITE_NAME:-frontend} migrate;
        fi
    environment:
      SITE_NAME: ${SITE_NAME:-frontend}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      create-site:
        condition: service_completed_successfully

  backend:
    <<: *dealerp-image
    restart: unless-stopped
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      migrate:
        condition: service_completed_successfully

  websocket:
    <<: *dealerp-image
    restart: unless-stopped
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      migrate:
        condition: service_completed_successfully

  queue-short:
    <<: *dealerp-image
    restart: unless-stopped
    command: ["bench", "worker", "--queue", "short,default"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      migrate:
        condition: service_completed_successfully

  queue-long:
    <<: *dealerp-image
    restart: unless-stopped
    command: ["bench", "worker", "--queue", "long,default,short"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      migrate:
        condition: service_completed_successfully

  scheduler:
    <<: *dealerp-image
    restart: unless-stopped
    command: ["bench", "schedule"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    <<: *dealerp-image
    restart: unless-stopped
    command: ["nginx-entrypoint.sh"]
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${SITE_NAME:-frontend}
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: "120"
      CLIENT_MAX_BODY_SIZE: 50m
    expose:
      - "8080"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      - backend
      - websocket
